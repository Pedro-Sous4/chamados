<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciar Logins — Laghetto</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#FDF8F0',
              100: '#F5ECCB',
              200: '#FDF0E0',
              300: '#c9a882',
              400: '#B6741A',
              500: '#925616',
              900: '#3b2008',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .btn-delete { padding:4px 12px; background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; border-radius:6px; font-size:.8rem; cursor:pointer; transition:background .15s; }
    .btn-delete:hover { background:#fecaca; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin 1s linear infinite; }
    @keyframes modalIn { from { opacity:0; transform:scale(.96) translateY(8px); } to { opacity:1; transform:none; } }
    .modal-anim { animation:modalIn .22s ease both; }
    .row-perf { cursor:pointer; }
    .row-perf:hover td:first-child { color:#925616; }
  </style>
</head>
<body class="min-h-screen bg-brand-50 text-brand-900">

<!-- Header -->
<header class="bg-brand-500 text-white px-8 py-[18px] flex items-center justify-between
               shadow-[0_2px_8px_rgba(146,86,22,.25)] gap-4 flex-wrap">
  <div class="flex items-center gap-3">
    <i data-lucide="shield-check" class="w-5 h-5 text-brand-100 opacity-80"></i>
    <h1 class="text-lg font-bold tracking-tight">Gerenciar Logins</h1>
  </div>
  <div class="flex items-center gap-4">
    <a href="/"
       class="text-brand-100 text-sm font-semibold no-underline flex items-center gap-1.5 hover:text-white transition-colors">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar à Central
    </a>
    <span id="user-email" class="text-xs opacity-65 hidden md:inline"></span>
    <button id="btn-logout"
            class="flex items-center gap-1.5 px-3.5 py-1.5 border border-brand-100/40 rounded-lg
                   text-brand-100 text-xs font-semibold hover:bg-brand-100/10 transition-colors
                   cursor-pointer bg-transparent">
      <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Sair
    </button>
  </div>
</header>

<!-- Main -->
<main class="max-w-4xl mx-auto px-5 py-8 flex flex-col gap-7">

  <!-- Card: lista de usuários -->
  <div class="bg-white rounded-xl border border-brand-100 shadow-[0_1px_6px_rgba(146,86,22,.08)] overflow-hidden">
    <div class="bg-brand-50 px-6 py-4 border-b-2 border-brand-100 flex items-center gap-3">
      <div class="w-8 h-8 bg-brand-100 rounded-lg flex items-center justify-center">
        <i data-lucide="users" class="w-4 h-4 text-brand-500"></i>
      </div>
      <div>
        <h2 class="text-sm font-bold text-brand-500">Usuários cadastrados</h2>
        <p class="text-xs text-brand-400/80 mt-0.5">Acesso ao site de chamados</p>
      </div>
    </div>

    <div id="empty-logins"
         class="py-10 text-center text-brand-400/65 text-sm flex-col items-center gap-2"
         style="display:none">
      <i data-lucide="user-x" class="w-8 h-8 opacity-40"></i>
      <span>Nenhum usuário cadastrado.</span>
    </div>

    <table id="table-logins" class="w-full border-collapse text-sm" style="display:none">
      <thead>
        <tr>
          <th class="bg-brand-50 text-brand-500 text-xs font-bold uppercase tracking-wider px-5 py-3 border-b-2 border-brand-100 text-left">Nome</th>
          <th class="bg-brand-50 text-brand-500 text-xs font-bold uppercase tracking-wider px-5 py-3 border-b-2 border-brand-100 text-left">Email</th>
          <th class="bg-brand-50 text-brand-500 text-xs font-bold uppercase tracking-wider px-5 py-3 border-b-2 border-brand-100 text-left">Nível</th>
          <th class="bg-brand-50 text-brand-500 text-xs font-bold uppercase tracking-wider px-5 py-3 border-b-2 border-brand-100 text-left whitespace-nowrap">Cadastrado em</th>
          <th class="bg-brand-50 text-brand-500 text-xs font-bold uppercase tracking-wider px-5 py-3 border-b-2 border-brand-100 text-left">Ação</th>
        </tr>
      </thead>
      <tbody id="tbody-logins"></tbody>
    </table>
  </div>

  <!-- Card: adicionar login -->
  <div class="bg-white rounded-xl border border-brand-100 shadow-[0_1px_6px_rgba(146,86,22,.08)] overflow-hidden">
    <div class="bg-brand-50 px-6 py-4 border-b-2 border-brand-100 flex items-center gap-3">
      <div class="w-8 h-8 bg-brand-100 rounded-lg flex items-center justify-center">
        <i data-lucide="user-plus" class="w-4 h-4 text-brand-500"></i>
      </div>
      <div>
        <h2 class="text-sm font-bold text-brand-500">Adicionar novo login</h2>
        <p class="text-xs text-brand-400/80 mt-0.5">Cadastre um novo acesso ao sistema</p>
      </div>
    </div>

    <div class="px-6 py-5 grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- Nome -->
      <div class="flex flex-col gap-1.5">
        <label for="new-name" class="text-xs font-bold uppercase tracking-wider text-brand-500">Nome completo</label>
        <div class="relative">
          <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-300 pointer-events-none"></i>
          <input type="text" id="new-name" placeholder="Nome do colaborador"
                 class="w-full pl-9 pr-3 py-2.5 border-[1.5px] border-brand-100 rounded-lg
                        text-sm text-brand-900 bg-white outline-none
                        focus:border-brand-400 focus:ring-2 focus:ring-brand-400/10
                        placeholder-brand-300 transition-all" />
        </div>
      </div>
      <!-- E-mail -->
      <div class="flex flex-col gap-1.5">
        <label for="new-email" class="text-xs font-bold uppercase tracking-wider text-brand-500">E-mail <span class="text-red-400">*</span></label>
        <div class="relative">
          <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-300 pointer-events-none"></i>
          <input type="email" id="new-email" placeholder="colaborador@laghetto.com.br"
                 class="w-full pl-9 pr-3 py-2.5 border-[1.5px] border-brand-100 rounded-lg
                        text-sm text-brand-900 bg-white outline-none
                        focus:border-brand-400 focus:ring-2 focus:ring-brand-400/10
                        placeholder-brand-300 transition-all" />
        </div>
      </div>
      <!-- Senha -->
      <div class="flex flex-col gap-1.5">
        <label for="new-password" class="text-xs font-bold uppercase tracking-wider text-brand-500">Senha <span class="text-red-400">*</span></label>
        <div class="relative">
          <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-300 pointer-events-none"></i>
          <input type="password" id="new-password" placeholder="Senha segura"
                 class="w-full pl-9 pr-3 py-2.5 border-[1.5px] border-brand-100 rounded-lg
                        text-sm text-brand-900 bg-white outline-none
                        focus:border-brand-400 focus:ring-2 focus:ring-brand-400/10
                        placeholder-brand-300 transition-all" />
        </div>
      </div>
      <!-- Nível -->
      <div class="flex flex-col gap-1.5">
        <label for="new-role" class="text-xs font-bold uppercase tracking-wider text-brand-500">Nível de permissão <span class="text-red-400">*</span></label>
        <div class="relative">
          <i data-lucide="shield" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-300 pointer-events-none"></i>
          <select id="new-role"
                  class="w-full pl-9 pr-3 py-2.5 border-[1.5px] border-brand-100 rounded-lg
                         text-sm text-brand-900 bg-white outline-none appearance-none
                         focus:border-brand-400 focus:ring-2 focus:ring-brand-400/10 transition-all cursor-pointer">
            <option value="administrador">🛡️ Administrador</option>
            <option value="supervisor">💼 Supervisor</option>
            <option value="usuario" selected>👤 Usuário</option>
          </select>
        </div>
      </div>
    </div>

    <div class="px-6 pb-5 flex items-center gap-3">
      <button id="btn-add"
              class="inline-flex items-center gap-1.5 px-5 py-2.5 bg-gradient-to-br from-brand-400 to-brand-500
                     text-white rounded-lg text-sm font-bold shadow-[0_2px_8px_rgba(146,86,22,.25)]
                     hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed
                     transition-all border-none cursor-pointer">
        <i data-lucide="user-plus" class="w-4 h-4"></i> Cadastrar
      </button>
      <span id="add-msg" class="hidden text-sm"></span>
    </div>
  </div>

</main>

<script>
  const token = localStorage.getItem('auth_token');
  if (!token) { window.location.replace('/login.html'); }

  document.getElementById('user-email').textContent = localStorage.getItem('auth_email') || '';
  lucide.createIcons();

  function authHeader() {
    return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
  }

  document.getElementById('btn-logout').addEventListener('click', async function () {
    await fetch('/api/auth/logout', { method: 'POST', headers: authHeader() }).catch(() => {});
    localStorage.removeItem('auth_token');
    localStorage.removeItem('auth_email');
    window.location.replace('/login.html');
  });

  function fmt(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
  }

  async function loadLogins() {
    const res = await fetch('/api/logins', { headers: authHeader() });
    if (res.status === 401) {
      localStorage.removeItem('auth_token');
      window.location.replace('/login.html');
      return;
    }
    const data   = await res.json();
    const logins = data.logins || [];
    const tbody  = document.getElementById('tbody-logins');
    const table  = document.getElementById('table-logins');
    const empty  = document.getElementById('empty-logins');
    const myEmail = localStorage.getItem('auth_email') || '';

    tbody.innerHTML = '';

    if (logins.length === 0) {
      table.style.display = 'none';
      empty.style.display = 'flex';
      lucide.createIcons();
      return;
    }

    table.style.display = 'table';
    empty.style.display = 'none';

const ROLE_BADGE = {
        administrador: 'background:#ede9fe;color:#5b21b6;border:1.5px solid #c4b5fd',
        supervisor:    'background:#fef3c7;color:#b45309;border:1.5px solid #fde68a',
        usuario:       'background:#f3f4f6;color:#374151;border:1.5px solid #d1d5db',
      };
      const ROLE_LABEL = { administrador: '🛡️ Administrador', supervisor: '💼 Supervisor', usuario: '👤 Usuário' };

      logins.forEach(function (u) {
        const tr = document.createElement('tr');
        tr.className = 'row-perf border-b border-brand-200 hover:bg-brand-50 transition-colors';
        const isMe = u.email.toLowerCase() === myEmail.toLowerCase();
        tr.dataset.user = JSON.stringify(u);
        const role  = (u.role || 'usuario').toLowerCase();
        const badge = ROLE_BADGE[role] || ROLE_BADGE.usuario;
        const label = ROLE_LABEL[role] || role;
        tr.innerHTML =
          '<td class="px-5 py-3 text-sm font-medium text-brand-900">' + (u.name || '<span class="text-brand-300 italic">—</span>') + '</td>' +
          '<td class="px-5 py-3 text-sm text-brand-700">' + u.email +
            (isMe ? ' <span class="text-[.7rem] bg-[#ede9fe] text-[#5b21b6] px-2 py-0.5 rounded-full">você</span>' : '') +
          '</td>' +
          '<td class="px-5 py-3"><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[.7rem] font-bold whitespace-nowrap" style="' + badge + '">' + label + '</span></td>' +
          '<td class="px-5 py-3 text-xs text-brand-400/70 whitespace-nowrap">' + fmt(u.createdAt) + '</td>' +
          '<td class="px-5 py-3">' +
            (isMe
              ? '<span class="text-brand-300 text-xs">—</span>'
              : '<button class="btn-delete" data-id="' + u.id + '">Remover</button>') +
          '</td>';
        tbody.appendChild(tr);
      });

    // Clique para ver perfil (exclui clique no botão remover)
    document.querySelectorAll('#tbody-logins .row-perf').forEach(function(row) {
      row.addEventListener('click', function(e) {
        if (e.target.closest('.btn-delete')) return;
        try { openPerfilLogin(JSON.parse(this.dataset.user)); } catch {}
      });
    });

    tbody.querySelectorAll('.btn-delete').forEach(function (btn) {
      btn.addEventListener('click', async function () {
        const id = this.dataset.id;
        if (!confirm('Remover este usuário?')) return;
        const r = await fetch('/api/logins', {
          method: 'DELETE',
          headers: authHeader(),
          body: JSON.stringify({ id }),
        });
        if (r.ok) {
          await loadLogins();
        } else {
          const d = await r.json();
          alert(d.error || 'Erro ao remover.');
        }
      });
    });
  }

  loadLogins();

  /* ─── MODAL PERFIL LOGIN ─── */
  const AV_COLORS_LGN = ['#e85d4a','#f79a3e','#70b5f9','#6dc6a0','#9f7aea','#f76d8e','#52b2cf','#a78bfa'];

  function initialsFromName(name, email) {
    if (name && name.trim()) {
      const parts = name.trim().split(/\s+/);
      if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
      return parts[0].slice(0, 2).toUpperCase();
    }
    const local = (email||'').split('@')[0];
    const parts2 = local.split(/[._\-]+/);
    if (parts2.length >= 2) return (parts2[0][0] + parts2[1][0]).toUpperCase();
    return local.slice(0,2).toUpperCase() || '?';
  }

  function avatarBgEmail(email) {
    let hash = 0;
    for (let i = 0; i < email.length; i++) hash = (hash * 31 + email.charCodeAt(i)) & 0xffffffff;
    return AV_COLORS_LGN[Math.abs(hash) % AV_COLORS_LGN.length];
  }

  function openPerfilLogin(u) {
    const myEmail = localStorage.getItem('auth_email') || '';
    const inits   = initialsFromName(u.name, u.email);
    const bg      = avatarBgEmail(u.email);
    const isMe    = u.email.toLowerCase() === myEmail.toLowerCase();
    const role    = (u.role || 'usuario').toLowerCase();
    const ROLE_STYLE = {
      administrador: 'background:#ede9fe;color:#5b21b6;border:1.5px solid #c4b5fd',
      supervisor:    'background:#fef3c7;color:#b45309;border:1.5px solid #fde68a',
      usuario:       'background:#f3f4f6;color:#374151;border:1.5px solid #d1d5db',
    };
    const ROLE_LABEL = { administrador: '🛡️ Administrador', supervisor: '💼 Supervisor', usuario: '👤 Usuário' };

    document.getElementById('lp-avatar').style.background = bg;
    document.getElementById('lp-iniciais').textContent    = inits;
    document.getElementById('lp-nome').textContent        = u.name || u.email.split('@')[0];
    document.getElementById('lp-email').textContent       = u.email;
    document.getElementById('lp-desde').textContent       = u.createdAt
      ? new Date(u.createdAt).toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' })
      : '—';
    const roleEl = document.getElementById('lp-role');
    roleEl.textContent = ROLE_LABEL[role] || role;
    roleEl.setAttribute('style', 'display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:9999px;font-size:.7rem;font-weight:700;' + (ROLE_STYLE[role] || ROLE_STYLE.usuario));
    const meTag = document.getElementById('lp-me-tag');
    meTag.style.display = isMe ? 'inline-flex' : 'none';
    document.getElementById('modal-perfil-login').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    lucide.createIcons();
  }

  function closePerfilLogin() {
    document.getElementById('modal-perfil-login').classList.add('hidden');
    document.body.style.overflow = '';
  }

  document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('lp-fechar').addEventListener('click',        closePerfilLogin);
    document.getElementById('lp-fechar-footer').addEventListener('click', closePerfilLogin);
    document.getElementById('modal-perfil-login').addEventListener('click', function(e) {
      if (e.target === this) closePerfilLogin();
    });
  });

  document.getElementById('btn-add').addEventListener('click', async function () {
    const email    = document.getElementById('new-email').value.trim();
    const password = document.getElementById('new-password').value;
    const name     = document.getElementById('new-name').value.trim();
    const role     = document.getElementById('new-role').value;
    const msgEl    = document.getElementById('add-msg');
    const btn      = this;

    msgEl.className = 'hidden text-sm';
    msgEl.textContent = '';

    if (!email || !password) {
      msgEl.className = 'text-sm text-red-700 bg-red-50 border border-red-200 px-3 py-1.5 rounded-lg';
      msgEl.textContent = 'Preencha email e senha.';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 spin"></i> Cadastrando…';
    lucide.createIcons();

    const res  = await fetch('/api/logins', {
      method: 'POST',
      headers: authHeader(),
      body: JSON.stringify({ email, password, name, role }),
    });
    const data = await res.json();

    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="user-plus" class="w-4 h-4"></i> Cadastrar';
    lucide.createIcons();

    if (!res.ok) {
      msgEl.className = 'text-sm text-red-700 bg-red-50 border border-red-200 px-3 py-1.5 rounded-lg';
      msgEl.textContent = data.error || 'Erro ao cadastrar.';
      return;
    }

    msgEl.className = 'text-sm text-green-700 bg-green-50 border border-green-200 px-3 py-1.5 rounded-lg';
    msgEl.textContent = 'Usuário cadastrado com sucesso!';
    document.getElementById('new-name').value     = '';
    document.getElementById('new-email').value    = '';
    document.getElementById('new-password').value = '';
    document.getElementById('new-role').value     = 'usuario';
    await loadLogins();
  });
</script>
<!-- MODAL PERFIL LOGIN -->
<div id="modal-perfil-login" class="fixed inset-0 z-50 flex items-center justify-center hidden"
     style="background:rgba(30,15,5,.65);backdrop-filter:blur(5px)">
  <div class="modal-anim w-full max-w-sm mx-4 rounded-2xl overflow-hidden shadow-2xl"
       style="background:#fff">

    <!-- Header -->
    <div class="relative flex flex-col items-center pt-8 pb-6 px-6"
         style="background:linear-gradient(135deg,#c98830 0%,#925616 100%)">
      <button id="lp-fechar"
              class="absolute top-3 right-3 text-white/60 hover:text-white bg-transparent border-none cursor-pointer p-1 transition-colors">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
      <div id="lp-avatar"
           class="w-20 h-20 rounded-full flex items-center justify-center
                  text-2xl font-black text-white shadow-[0_4px_20px_rgba(0,0,0,.25)]
                  border-4 border-white/25 mb-3"
           style="letter-spacing:.5px"></div>
      <p id="lp-nome" class="text-white font-black text-lg leading-snug text-center max-w-[200px]"></p>
      <p id="lp-iniciais" class="hidden"></p>
      <div id="lp-me-tag" class="hidden mt-2 items-center gap-1 px-3 py-0.5 rounded-full
                                  bg-white/20 border border-white/30 text-white text-xs font-bold">
        <i data-lucide="check-circle" class="w-3 h-3"></i> Você
      </div>
    </div>

    <!-- Body -->
    <div class="px-6 py-5 flex flex-col gap-4">

      <!-- E-mail -->
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0"
             style="background:#fdf8f0;border:1px solid #F5ECCB">
          <i data-lucide="mail" class="w-4 h-4 text-brand-500"></i>
        </div>
        <div>
          <p class="text-[.6rem] font-black uppercase tracking-widest text-brand-300">E-mail</p>
          <p id="lp-email" class="text-sm font-semibold text-brand-900 mt-0.5 break-all"></p>
        </div>
      </div>

      <!-- Cadastrado em -->
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0"
             style="background:#fdf8f0;border:1px solid #F5ECCB">
          <i data-lucide="calendar" class="w-4 h-4 text-brand-500"></i>
        </div>
        <div>
          <p class="text-[.6rem] font-black uppercase tracking-widest text-brand-300">Cadastrado em</p>
          <p id="lp-desde" class="text-sm font-semibold text-brand-900 mt-0.5"></p>
        </div>
      </div>

      <!-- Perfil -->
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0"
             style="background:#fdf8f0;border:1px solid #F5ECCB">
          <i data-lucide="shield-check" class="w-4 h-4 text-brand-500"></i>
        </div>
        <div>
          <p class="text-[.6rem] font-black uppercase tracking-widest text-brand-300">Nível de acesso</p>
          <span id="lp-role" class="mt-0.5"></span>
        </div>
      </div>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="px-6 pb-5 flex justify-end">
      <button id="lp-fechar-footer"
              class="inline-flex items-center gap-1.5 px-5 py-2.5 rounded-lg text-sm font-bold
                     border border-brand-100 text-brand-500 bg-white hover:bg-brand-50
                     transition-colors cursor-pointer">
        <i data-lucide="x" class="w-4 h-4"></i> Fechar
      </button>
    </div>

  </div>
</div>

</body>
</html>
