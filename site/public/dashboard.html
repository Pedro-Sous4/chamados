<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Executivo | Suporte TI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        h1 { font-size: 2rem; font-weight: 700; color: var(--text); }
        h1 span { color: var(--accent); }

        .filters {
            display: flex;
            gap: 1rem;
            align-items: center;
            background: var(--card-bg);
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        input[type="date"] {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-family: inherit;
        }

        .btn-action {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); }

        .btn-back {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-back:hover { color: var(--accent); }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            padding: 1.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        .kpi-card h3 { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .kpi-card .value { font-size: 2.5rem; font-weight: 700; color: var(--accent); }

        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .chart-header h4 { font-size: 1.1rem; font-weight: 600; }
        .btn-download { background: none; border: none; color: var(--accent); cursor: pointer; transition: 0.3s; font-size: 0.8rem; font-weight: 700; padding: 4px 8px; border-radius: 4px; background: rgba(56, 189, 248, 0.1); }
        .btn-download:hover { background: var(--accent); color: #000; }

        .chart-container { position: relative; height: 350px; background: rgba(0,0,0,0.1); border-radius: 1rem; padding: 1rem; }

        .ranking-list { list-style: none; }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--glass-border);
        }
        .ranking-item:last-child { border: none; }
        .ranking-name { font-weight: 600; }
        .ranking-count { color: var(--accent); font-weight: 700; }

        @media (max-width: 1024px) {
            .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <a href="index.html" class="btn-back">← Voltar ao Gerenciamento</a>
            <h1>Business <span>Intelligence</span></h1>
        </div>
        <div class="filters">
            <label>Período:</label>
            <input type="date" id="startDate">
            <span>até</span>
            <input type="date" id="endDate">
            <button class="btn-action" onclick="loadData()">Filtrar</button>
            <button class="btn-action btn-secondary" onclick="exportToExcel()">Exportar XLSX</button>
        </div>
    </header>

    <div class="kpi-grid">
        <div class="card kpi-card">
            <h3>Total de Chamados</h3>
            <div class="value" id="valTotal">0</div>
        </div>
        <div class="card kpi-card">
            <h3>Via WhatsApp</h3>
            <div class="value" id="valWhatsApp" style="color: #22c55e;">0</div>
        </div>
        <div class="card kpi-card">
            <h3>Via Painel Web</h3>
            <div class="value" id="valSite" style="color: #6366f1;">0</div>
        </div>
        <div class="card kpi-card">
            <h3>Em Aberto</h3>
            <div class="value" id="valAberto" style="color: #fbbf24;">0</div>
        </div>
        <div class="card kpi-card">
            <h3>Concluídos</h3>
            <div class="value" id="valConcluido" style="color: #4ade80;">0</div>
        </div>
    </div>

    <div class="chart-grid">
        <div class="card chart-card">
            <div class="chart-header">
                <h4>Distribuição por Setor / Sala</h4>
                <button class="btn-download" onclick="downloadChart('chartSetores', 'Distribuicao_Setores.png')">⬇ DOWNLOAD PNG</button>
            </div>
            <div class="chart-container">
                <canvas id="chartSetores"></canvas>
            </div>
        </div>
        <div class="card chart-card">
            <div class="chart-header">
                <h4>Tipos de Problemas</h4>
                <button class="btn-download" onclick="downloadChart('chartTipos', 'Tipos_Problemas.png')">⬇ DOWNLOAD PNG</button>
            </div>
            <div class="chart-container">
                <canvas id="chartTipos"></canvas>
            </div>
        </div>
    </div>

    <div class="chart-grid">
        <div class="card chart-card">
            <h4>Ranking de Solicitantes (Top 5)</h4>
            <div id="rankingList" class="ranking-list" style="margin-top: 1rem;"></div>
        </div>
        <div class="card chart-card">
            <h4>Palavras-Chave Frequentes</h4>
            <div id="keywordCloud" style="display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 1rem;"></div>
        </div>
    </div>

    <div class="chart-grid" style="grid-template-columns: 1fr;">
        <div class="card chart-card">
            <div class="chart-header">
                <h4>Volume por Origem</h4>
                <button class="btn-download" onclick="downloadChart('chartOrigem', 'Origem_Chamados.png')">⬇ DOWNLOAD PNG</button>
            </div>
            <div class="chart-container" style="height: 300px;">
                <canvas id="chartOrigem"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    let charts = {};
    let rawTicketsList = [];

    async function loadData() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        
        const url = `/api/stats?start=${start}&end=${end}`;
        const response = await fetch(url);
        const data = await response.json();

        // Correção: Extrai a lista de tickets da propriedade .tickets
        const tResponse = await fetch(`/api/tickets?start=${start}&end=${end}`);
        const tJson = await tResponse.json();
        rawTicketsList = tJson.tickets || [];

        document.getElementById('valTotal').innerText = data.total;
        document.getElementById('valWhatsApp').innerText = data.porOrigem.bot || 0;
        document.getElementById('valSite').innerText = data.porOrigem.site || 0;
        document.getElementById('valAberto').innerText = data.status.aberto;
        document.getElementById('valConcluido').innerText = data.status.concluido;

        renderCharts(data);
        renderRanking(data.porSolicitante);
        renderKeywords(data.palavrasChave);
    }

    function renderCharts(data) {
        Object.values(charts).forEach(c => c.destroy());

        // CHART SETORES
        const ctxSetores = document.getElementById('chartSetores').getContext('2d');
        charts.setores = new Chart(ctxSetores, {
            type: 'bar',
            data: {
                labels: Object.keys(data.porSetor),
                datasets: [{
                    label: 'Quantidade',
                    data: Object.values(data.porSetor),
                    backgroundColor: '#38bdf8',
                    borderRadius: 12,
                    barThickness: 60
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false },
                    title: { display: true, text: 'Distribuição por Setor / Sala', color: '#f1f5f9', font: { size: 16, weight: 'bold' }, padding: 20 }
                },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', stepSize: 1 } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 13, weight: '600' } } }
                }
            }
        });

        // CHART TIPOS
        const ctxTipos = document.getElementById('chartTipos').getContext('2d');
        charts.tipos = new Chart(ctxTipos, {
            type: 'doughnut',
            data: {
                labels: Object.keys(data.porTipo),
                datasets: [{
                    data: Object.values(data.porTipo),
                    backgroundColor: ['#38bdf8', '#818cf8', '#fb7185', '#fbbf24', '#34d399'],
                    borderWidth: 2,
                    borderColor: '#1e293b',
                    hoverOffset: 15
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '70%',
                plugins: { 
                    legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 12 } } },
                    title: { display: true, text: 'Tipos de Problemas', color: '#f1f5f9', font: { size: 16, weight: 'bold' }, padding: 20 }
                }
            }
        });

        // CHART ORIGEM
        const ctxOrigem = document.getElementById('chartOrigem').getContext('2d');
        charts.origem = new Chart(ctxOrigem, {
            type: 'pie',
            data: {
                labels: ['WhatsApp (Bot)', 'Painel (Site)'],
                datasets: [{
                    data: [data.porOrigem.bot, data.porOrigem.site],
                    backgroundColor: ['#22c55e', '#6366f1'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 14 } } },
                    title: { display: true, text: 'Volume por Origem', color: '#f1f5f9', font: { size: 16, weight: 'bold' }, padding: 20 }
                }
            }
        });
    }

    function renderRanking(solicitantes) {
        const sorted = Object.entries(solicitantes)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5);
        
        const list = document.getElementById('rankingList');
        list.innerHTML = sorted.map(([nome, total]) => `
            <li class="ranking-item">
                <span class="ranking-name">${nome}</span>
                <span class="ranking-count">${total} chamados</span>
            </li>
        `).join('') || '<p style="color:var(--text-muted)">Sem chamados.</p>';
    }

    function renderKeywords(palavras) {
        const sorted = Object.entries(palavras)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 15);
        
        const container = document.getElementById('keywordCloud');
        container.innerHTML = sorted.map(([word, count]) => {
            const size = Math.min(1.4, 0.9 + (count * 0.15));
            return `<span style="font-size: ${size}rem; background: rgba(56, 189, 248, 0.1); padding: 0.4rem 0.9rem; border-radius: 2rem; border: 1px solid rgba(56, 189, 248, 0.2); text-transform: capitalize; color: #fff;">${word}</span>`;
        }).join('') || '<p style="color:var(--text-muted)">Aguardando dados...</p>';
    }

    function exportToExcel() {
        if (!rawTicketsList || rawTicketsList.length === 0) return alert("Nenhum dado para exportar.");
        
        const dataToExport = rawTicketsList.map(t => ({
            "ID": t.id,
            "Data": new Date(t.createdAt).toLocaleString('pt-BR'),
            "Solicitante": t.name || t.solicitanteNome || t.solicitante,
            "WhatsApp/ID": t.number || "Site",
            "Setor/Sala": t.sala,
            "Tipo": t.type,
            "Descrição": t.description,
            "Status": t.status,
            "Origem": t.origem
        }));

        const ws = XLSX.utils.json_to_sheet(dataToExport);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Relatorio");
        XLSX.writeFile(wb, `Relatorio_TI_${new Date().toISOString().split('T')[0]}.xlsx`);
    }

    function downloadChart(chartId, filename) {
        const canvas = document.getElementById(chartId);
        
        // Criar um canvas temporário para o fundo escuro (para o PNG não ficar transparente/estranho)
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
        const tempCtx = tempCanvas.getContext('2d');
        
        // Fundo escuro igual ao Dashboard
        tempCtx.fillStyle = '#1e293b';
        tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
        
        // Desenha o gráfico por cima
        tempCtx.drawImage(canvas, 0, 0);
        
        const link = document.createElement('a');
        link.download = filename;
        link.href = tempCanvas.toDataURL('image/png', 1.0);
        link.click();
    }

    // Datas padrão: hoje e 30 dias atrás
    const today = new Date();
    const lastMonth = new Date();
    lastMonth.setDate(today.getDate() - 30);
    document.getElementById('startDate').value = lastMonth.toISOString().split('T')[0];
    document.getElementById('endDate').value = today.toISOString().split('T')[0];
    
    loadData();
</script>
</body>
</html>
