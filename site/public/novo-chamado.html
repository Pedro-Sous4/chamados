<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo Chamado — Laghetto</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#FDF8F0',
              100: '#F5ECCB',
              200: '#FDF0E0',
              300: '#c9a882',
              400: '#B6741A',
              500: '#925616',
              900: '#3b2008',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="min-h-screen bg-brand-50 text-brand-900">

<!-- Header -->
<header class="bg-brand-500 text-white px-8 py-[18px] flex items-center justify-between
               shadow-[0_2px_8px_rgba(146,86,22,.25)]">
  <div class="flex items-center gap-3">
    <i data-lucide="headphones" class="w-5 h-5 text-brand-100 opacity-80"></i>
    <h1 class="text-lg font-bold tracking-tight">Central de Chamados</h1>
  </div>
  <div class="flex items-center gap-4">
    <a href="/"
       class="text-brand-100 text-sm font-semibold no-underline flex items-center gap-1.5 hover:text-white transition-colors">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar à lista
    </a>
    <button id="btn-logout"
            class="flex items-center gap-1.5 px-3.5 py-1.5 border border-brand-100/40 rounded-lg
                   text-brand-100 text-xs font-semibold hover:bg-brand-100/10 transition-colors
                   cursor-pointer bg-transparent">
      <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Sair
    </button>
  </div>
</header>

<!-- Main -->
<main class="max-w-xl mx-auto px-4 py-10">
  <div class="bg-white rounded-xl border border-brand-100 shadow-[0_1px_6px_rgba(146,86,22,.08)] p-8">

    <div class="flex items-center gap-3 mb-6">
      <div class="w-9 h-9 bg-brand-100 rounded-lg flex items-center justify-center">
        <i data-lucide="ticket" class="w-5 h-5 text-brand-500"></i>
      </div>
      <h2 class="text-lg font-bold text-brand-500">Abrir novo chamado</h2>
    </div>

    <!-- Alert -->
    <div id="alert" class="hidden mb-5 px-4 py-3 rounded-lg text-sm items-center gap-2 border"></div>

    <form id="form" novalidate class="flex flex-col gap-5">

      <!-- Nome -->
      <div class="flex flex-col gap-1.5">
        <label for="name" class="text-xs font-bold uppercase tracking-wider text-brand-500">
          Nome <span class="text-brand-400">*</span>
        </label>
        <div class="relative">
          <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-300 pointer-events-none"></i>
          <input id="name" type="text" placeholder="Nome do solicitante" maxlength="120" required
                 class="w-full pl-9 pr-3 py-2.5 border-[1.5px] border-brand-100 rounded-lg
                        text-sm text-brand-900 bg-white outline-none
                        focus:border-brand-400 focus:ring-2 focus:ring-brand-400/10
                        placeholder-brand-300 transition-all" />
        </div>
      </div>

      <!-- Número -->
      <div class="flex flex-col gap-1.5">
        <label for="number" class="text-xs font-bold uppercase tracking-wider text-brand-500">
          Número (WhatsApp) <span class="text-brand-400">*</span>
        </label>
        <div class="relative">
          <i data-lucide="smartphone" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-300 pointer-events-none"></i>
          <input id="number" type="tel" placeholder="Ex: 5511999999999" maxlength="20" required
                 class="w-full pl-9 pr-3 py-2.5 border-[1.5px] border-brand-100 rounded-lg
                        text-sm text-brand-900 bg-white outline-none
                        focus:border-brand-400 focus:ring-2 focus:ring-brand-400/10
                        placeholder-brand-300 transition-all" />
        </div>
      </div>

      <!-- Tipo -->
      <div class="flex flex-col gap-1.5">
        <label for="type" class="text-xs font-bold uppercase tracking-wider text-brand-500">
          Tipo <span class="text-brand-400">*</span>
        </label>
        <div class="relative">
          <i data-lucide="tag" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-300 pointer-events-none"></i>
          <select id="type" required
                  class="w-full pl-9 pr-3 py-2.5 border-[1.5px] border-brand-100 rounded-lg
                         text-sm text-brand-900 bg-white outline-none
                         focus:border-brand-400 focus:ring-2 focus:ring-brand-400/10
                         transition-all appearance-none">
            <option value="">Carregando…</option>
          </select>
        </div>
      </div>

      <!-- Descrição -->
      <div class="flex flex-col gap-1.5">
        <label for="description" class="text-xs font-bold uppercase tracking-wider text-brand-500">
          Descrição <span class="text-brand-400">*</span>
        </label>
        <textarea id="description" placeholder="Descreva o problema…" maxlength="1000" required
                  class="w-full px-3 py-2.5 border-[1.5px] border-brand-100 rounded-lg
                         text-sm text-brand-900 bg-white outline-none
                         focus:border-brand-400 focus:ring-2 focus:ring-brand-400/10
                         placeholder-brand-300 transition-all resize-y min-h-[110px]"></textarea>
      </div>

      <!-- Ações -->
      <div class="flex gap-3 justify-end pt-1">
        <a href="/"
           class="inline-flex items-center gap-1.5 px-4 py-2.5 border-[1.5px] border-brand-100
                  rounded-lg text-sm font-semibold text-brand-500 hover:bg-brand-50 transition-colors no-underline">
          <i data-lucide="x" class="w-4 h-4"></i> Cancelar
        </a>
        <button id="btn-submit" type="submit"
                class="inline-flex items-center gap-1.5 px-5 py-2.5 bg-gradient-to-br from-brand-400 to-brand-500
                       text-white rounded-lg text-sm font-bold shadow-[0_2px_10px_rgba(146,86,22,.28)]
                       hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed
                       transition-all border-none cursor-pointer">
          <i data-lucide="send" class="w-4 h-4"></i> Abrir chamado
        </button>
      </div>

    </form>
  </div>
</main>

<script>
  (function () {
    const t = localStorage.getItem('auth_token');
    if (!t) { window.location.replace('/login.html'); return; }
  })();

  lucide.createIcons();

  // Carrega tipos do servidor
  (async function () {
    const sel = document.getElementById('type');
    try {
      const res   = await fetch('/api/tipos');
      const data  = await res.json();
      const tipos = data.tipos || [];
      sel.innerHTML = '<option value="">Selecione…</option>' +
        tipos.map(function(t) {
          return '<option value="' + t.label + '">' + t.label + '</option>';
        }).join('');
    } catch {
      sel.innerHTML = '<option value="">Erro ao carregar tipos</option>';
    }
  })();

  document.getElementById('btn-logout').addEventListener('click', async function () {
    const t = localStorage.getItem('auth_token');
    await fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + t } }).catch(() => {});
    localStorage.removeItem('auth_token');
    localStorage.removeItem('auth_email');
    window.location.replace('/login.html');
  });

  const form      = document.getElementById('form');
  const alertEl   = document.getElementById('alert');
  const btnSubmit = document.getElementById('btn-submit');

  function showAlert(msg, type) {
    alertEl.className = type === 'success'
      ? 'flex mb-5 px-4 py-3 rounded-lg text-sm items-center gap-2 border bg-green-50 text-green-800 border-green-200'
      : 'flex mb-5 px-4 py-3 rounded-lg text-sm items-center gap-2 border bg-red-50 text-red-800 border-red-200';
    const icon = type === 'success' ? 'check-circle' : 'alert-circle';
    alertEl.innerHTML = '<i data-lucide="' + icon + '" class="w-4 h-4 shrink-0"></i><span>' + msg + '</span>';
    lucide.createIcons();
  }

  function clearAlert() {
    alertEl.className = 'hidden';
    alertEl.textContent = '';
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearAlert();

    const name        = document.getElementById('name').value.trim();
    const number      = document.getElementById('number').value.trim();
    const type        = document.getElementById('type').value;
    const description = document.getElementById('description').value.trim();

    if (!name || !number || !type || !description) {
      showAlert('Preencha todos os campos obrigatórios.', 'error');
      return;
    }

    btnSubmit.disabled = true;
    btnSubmit.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Salvando…';
    lucide.createIcons();

    try {
      const token = localStorage.getItem('auth_token');
      const res = await fetch('/api/tickets', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ name, number, type, description, origem: 'site', notifWpp: number.replace(/\D/g, '') }),
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert(data.error || 'Erro ao salvar chamado.', 'error');
        return;
      }

      showAlert('Chamado #' + data.id + ' aberto com sucesso!', 'success');
      form.reset();
      setTimeout(function() { window.location.href = '/'; }, 1800);
    } catch (err) {
      showAlert('Erro de conexão: ' + err.message, 'error');
    } finally {
      btnSubmit.disabled = false;
      btnSubmit.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> Abrir chamado';
      lucide.createIcons();
    }
  });
</script>
</body>
</html>
